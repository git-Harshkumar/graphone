services:
  # ─── Backend: Express API ───────────────────────────────────────────────────
  - type: web
    name: graphone-backend
    runtime: node
    region: singapore   # closest to India; change to frankfurt/ohio as needed
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render injects PORT automatically; this is a fallback
      - key: SUPABASE_URL
        sync: false           # Fill manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: CORS_ORIGIN
        sync: false           # Set to your frontend URL after deploy

  # ─── Frontend: Next.js ──────────────────────────────────────────────────────
  - type: web
    name: graphone-frontend
    runtime: node
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false           # Set to your backend Render URL after deploy
